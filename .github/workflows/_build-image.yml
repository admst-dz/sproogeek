name: Reusable image build

on:
  workflow_call:
    inputs:
      image:
        description: "Short name (frontend|backend|renderer|techcard|unwrap|block-builder)"
        required: true
        type: string
      context:
        description: "Build context path"
        required: true
        type: string
      dockerfile:
        description: "Path to Dockerfile relative to repo root (overrides default <context>/Dockerfile)"
        required: false
        type: string
        default: ""
      tag:
        description: "Image tag (dev|latest|sha-…)"
        required: true
        type: string
      build_args:
        description: "Multi-line build args (KEY=VAL each)"
        required: false
        type: string
        default: ""

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.dockerfile != '' && inputs.dockerfile || format('{0}/Dockerfile', inputs.context) }}
          push: true
          tags: ghcr.io/admst-dz/spruzhyk-${{ inputs.image }}:${{ inputs.tag }}
          build-args: ${{ inputs.build_args }}
          cache-from: type=registry,ref=ghcr.io/admst-dz/spruzhyk-${{ inputs.image }}:cache-${{ inputs.tag }}
          cache-to: type=registry,ref=ghcr.io/admst-dz/spruzhyk-${{ inputs.image }}:cache-${{ inputs.tag }},mode=max

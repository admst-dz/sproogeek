services:
  db:
    image: public.ecr.aws/docker/library/postgres:15-alpine
    pull_policy: if_not_present
    container_name: spruzhuk_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - spruzhuk_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: public.ecr.aws/bitnami/kafka:3.6
    container_name: spruzhuk_kafka
    restart: unless-stopped
    environment:
      KAFKA_CFG_NODE_ID: "1"
      KAFKA_CFG_PROCESS_ROLES: controller,broker
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - kafka_data:/bitnami/kafka
    networks:
      - spruzhuk_net
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  pgbouncer:
    image: edoburu/pgbouncer:latest
    container_name: spruzhuk_pgbouncer
    restart: unless-stopped
    environment:
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB}
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 1000
      DEFAULT_POOL_SIZE: 25
      RESERVE_POOL_SIZE: 5
      RESERVE_POOL_TIMEOUT: 3
      SERVER_RESET_QUERY: DISCARD ALL
      AUTH_TYPE: scram-sha-256
    depends_on:
      db:
        condition: service_healthy
    networks:
      - spruzhuk_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -p 5432 -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  backend:
    image: ghcr.io/admst-dz/spruzhyk-backend:latest
    pull_policy: always
    # container_name снят: позволяет запускать через `--scale backend=2|3`.
    restart: unless-stopped
    deploy:
      replicas: 2  # подсказка для swarm; в обычном compose используется --scale backend=2
    environment:
      # Бэкенд собирает SQLAlchemy URL сам, чтобы пароли со спецсимволами
      # не ломали строку подключения.
      DATABASE_USER: ${POSTGRES_USER}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD}
      DATABASE_HOST: pgbouncer
      DATABASE_PORT: 5432
      DATABASE_NAME: ${POSTGRES_DB}
      SECRET_KEY: ${SECRET_KEY}
      APP_ENV: ${APP_ENV:-production}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-kafka:9092}
      SENTRY_DSN: ${SENTRY_DSN:-}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-}
      RENDERER_URL: ${RENDERER_URL:-http://renderer:3000}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      ADMIN_BACKDOOR_ENABLED: ${ADMIN_BACKDOOR_ENABLED:-false}
      ADMIN_BACKDOOR_LOGIN: ${ADMIN_BACKDOOR_LOGIN:-}
      ADMIN_BACKDOOR_PASSWORD: ${ADMIN_BACKDOOR_PASSWORD:-}
      ADMIN_BACKDOOR_KEY: ${ADMIN_BACKDOOR_KEY:-}
      TECHCARD_URL: ${TECHCARD_URL:-http://techcard:8000}
      S3_ENDPOINT_URL: ${S3_ENDPOINT_URL}
      S3_PUBLIC_ENDPOINT: ${S3_PUBLIC_ENDPOINT:-}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_BUCKET: ${S3_BUCKET:-techcards}
    depends_on:
      pgbouncer:
        condition: service_healthy
      kafka:
        condition: service_healthy
        required: false
      minio:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - spruzhuk_net

  redis:
    image: public.ecr.aws/docker/library/redis:7-alpine
    container_name: spruzhuk_redis
    restart: unless-stopped
    command: ["redis-server", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru", "--save", ""]
    networks:
      - spruzhuk_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  frontend:
    image: ghcr.io/admst-dz/spruzhyk-frontend:latest
    pull_policy: always
    container_name: spruzhuk_app
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - backend
    networks:
      - spruzhuk_net
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost/healthz || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s

  frontend-render:
    image: ghcr.io/admst-dz/spruzhyk-frontend:latest
    pull_policy: always
    container_name: spruzhuk_app_render
    restart: unless-stopped
    networks:
      - spruzhuk_net
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost/healthz || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s

  renderer:
    image: ghcr.io/admst-dz/spruzhyk-renderer:latest
    pull_policy: always
    container_name: spruzhuk_renderer
    restart: unless-stopped
    environment:
      RENDER_FRONTEND_HOST: frontend-render
      RENDER_FRONTEND_PORT: 80
      RENDER_FRONTEND_PATH: /render/
      RENDER_MAX_CONCURRENCY: ${RENDER_MAX_CONCURRENCY:-3}
      RENDER_PAGE_TIMEOUT_MS: ${RENDER_PAGE_TIMEOUT_MS:-20000}
    depends_on:
      frontend-render:
        condition: service_healthy
    networks:
      - spruzhuk_net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/healthz >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s

  minio:
    image: quay.io/minio/minio:latest
    container_name: spruzhuk_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    networks:
      - spruzhuk_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/ready"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  techcard:
    image: ghcr.io/admst-dz/spruzhyk-techcard:latest
    pull_policy: always
    container_name: spruzhuk_techcard
    restart: unless-stopped
    depends_on:
      minio:
        condition: service_healthy
    environment:
      S3_ENDPOINT_URL: ${S3_ENDPOINT_URL}
      S3_PUBLIC_ENDPOINT: ${S3_PUBLIC_ENDPOINT:-}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_BUCKET: ${S3_BUCKET:-techcards}
      MANUFACTURER_NAME: ${MANUFACTURER_NAME:-ООО «Спружык»}
      MANUFACTURER_ID: ${MANUFACTURER_ID:-SPRUZHYK-001}
    networks:
      - spruzhuk_net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8000/healthz >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s

networks:
  spruzhuk_net:
    driver: bridge

volumes:
  postgres_data:
  kafka_data:
  minio_data:

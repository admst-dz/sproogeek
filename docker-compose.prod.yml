services:
  db:
    image: public.ecr.aws/docker/library/postgres:15-alpine
    pull_policy: if_not_present
    container_name: spruzhuk_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - spruzhuk_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: ghcr.io/admst-dz/spruzhyk-backend:latest
    pull_policy: always
    container_name: spruzhuk_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      SECRET_KEY: ${SECRET_KEY}
      APP_ENV: ${APP_ENV:-production}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-}
      SENTRY_DSN: ${SENTRY_DSN:-}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-}
      RENDERER_URL: ${RENDERER_URL:-http://renderer:3000}
      ADMIN_BACKDOOR_ENABLED: ${ADMIN_BACKDOOR_ENABLED:-false}
      ADMIN_BACKDOOR_LOGIN: ${ADMIN_BACKDOOR_LOGIN:-}
      ADMIN_BACKDOOR_PASSWORD: ${ADMIN_BACKDOOR_PASSWORD:-}
      ADMIN_BACKDOOR_KEY: ${ADMIN_BACKDOOR_KEY:-}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - spruzhuk_net

  frontend:
    image: ghcr.io/admst-dz/spruzhyk-frontend:latest
    pull_policy: always
    container_name: spruzhuk_app
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - backend
    networks:
      - spruzhuk_net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/ >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  frontend-render:
    image: ghcr.io/admst-dz/spruzhyk-frontend:latest
    pull_policy: always
    container_name: spruzhuk_app_render
    restart: unless-stopped
    networks:
      - spruzhuk_net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/render/ >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  renderer:
    image: ghcr.io/admst-dz/spruzhyk-renderer:latest
    pull_policy: always
    container_name: spruzhuk_renderer
    restart: unless-stopped
    environment:
      RENDER_FRONTEND_HOST: frontend-render
      RENDER_FRONTEND_PORT: 80
      RENDER_FRONTEND_PATH: /render/
      RENDER_MAX_CONCURRENCY: ${RENDER_MAX_CONCURRENCY:-3}
      RENDER_PAGE_TIMEOUT_MS: ${RENDER_PAGE_TIMEOUT_MS:-20000}
    depends_on:
      frontend-render:
        condition: service_healthy
    networks:
      - spruzhuk_net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/healthz >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

networks:
  spruzhuk_net:
    driver: bridge

volumes:
  postgres_data:

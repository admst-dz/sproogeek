services:
  db:
    image: public.ecr.aws/docker/library/postgres:15-alpine
    pull_policy: if_not_present
    container_name: spruzhuk_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rootpassword}
      POSTGRES_DB: ${POSTGRES_DB:-spruzhuk}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - spruzhuk_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-spruzhuk}"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: public.ecr.aws/bitnami/kafka:3.6
    container_name: spruzhuk_kafka
    restart: unless-stopped
    environment:
      KAFKA_CFG_NODE_ID: "1"
      KAFKA_CFG_PROCESS_ROLES: controller,broker
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - kafka_data:/bitnami/kafka
    networks:
      - spruzhuk_net
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  backend:
    image: ghcr.io/admst-dz/spruzhyk-backend:dev
    pull_policy: always
    build:
      context: ./backend
    container_name: spruzhuk_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://postgres:rootpassword@db:5432/spruzhuk}
      SECRET_KEY: ${SECRET_KEY:-dev-only-secret-change-before-production}
      APP_ENV: ${APP_ENV:-development}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      YANDEX_CLIENT_ID: ${YANDEX_CLIENT_ID:-}
      YANDEX_CLIENT_SECRET: ${YANDEX_CLIENT_SECRET:-}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-kafka:9092}
      SENTRY_DSN: ${SENTRY_DSN:-}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173,http://localhost,http://127.0.0.1}
      RENDERER_URL: ${RENDERER_URL:-http://renderer:3000}
      TECHCARD_URL: ${TECHCARD_URL:-http://techcard:8000}
      UNWRAP_URL: ${UNWRAP_URL:-http://unwrap:8000}
      BLOCK_BUILDER_URL: ${BLOCK_BUILDER_URL:-http://block_builder:8000}
      GLB_UNWRAPPER_URL: ${GLB_UNWRAPPER_URL:-http://glb_unwrapper:8000}
      S3_ENDPOINT_URL: ${S3_ENDPOINT_URL:-http://minio:9000}
      S3_PUBLIC_ENDPOINT: ${S3_PUBLIC_ENDPOINT:-http://localhost:9000}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-${MINIO_ROOT_USER:-spruzhyk}}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-${MINIO_ROOT_PASSWORD:-spruzhyk-dev-secret}}
      S3_BUCKET: ${S3_BUCKET:-techcards}
    depends_on:
      db:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - spruzhuk_net

  frontend:
    image: ghcr.io/admst-dz/spruzhyk-frontend:dev
    pull_policy: always
    build:
      context: ./frontend
    container_name: spruzhuk_app
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - backend
    networks:
      - spruzhuk_net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/ >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  frontend-render:
    image: ghcr.io/admst-dz/spruzhyk-frontend:dev
    pull_policy: always
    container_name: spruzhuk_app_render
    restart: unless-stopped
    networks:
      - spruzhuk_net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/render/ >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  renderer:
    image: ghcr.io/admst-dz/spruzhyk-renderer:dev
    pull_policy: always
    build:
      context: ./microservices/renderer
    container_name: spruzhuk_renderer
    restart: unless-stopped
    environment:
      RENDER_FRONTEND_HOST: frontend-render
      RENDER_FRONTEND_PORT: 80
      RENDER_FRONTEND_PATH: /render/
      RENDER_MAX_CONCURRENCY: ${RENDER_MAX_CONCURRENCY:-2}
      RENDER_PAGE_TIMEOUT_MS: ${RENDER_PAGE_TIMEOUT_MS:-15000}
    depends_on:
      frontend-render:
        condition: service_healthy
    networks:
      - spruzhuk_net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/healthz >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

  minio:
    image: quay.io/minio/minio:latest
    container_name: spruzhuk_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-spruzhyk}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-spruzhyk-dev-secret}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - spruzhuk_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/ready"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  techcard:
    image: ghcr.io/admst-dz/spruzhyk-techcard:dev
    pull_policy: always
    build:
      context: ./microservices/techcard
    container_name: spruzhuk_techcard
    restart: unless-stopped
    environment:
      S3_ENDPOINT_URL: ${S3_ENDPOINT_URL:-http://minio:9000}
      S3_PUBLIC_ENDPOINT: ${S3_PUBLIC_ENDPOINT:-http://localhost:9000}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-${MINIO_ROOT_USER:-spruzhyk}}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-${MINIO_ROOT_PASSWORD:-spruzhyk-dev-secret}}
      S3_BUCKET: ${S3_BUCKET:-techcards}
      MANUFACTURER_NAME: ${MANUFACTURER_NAME:-ООО «Спружык»}
      MANUFACTURER_ID: ${MANUFACTURER_ID:-SPRUZHYK-001}
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - spruzhuk_net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8000/healthz >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s

  unwrap:
    image: ghcr.io/admst-dz/spruzhyk-unwrap:dev
    pull_policy: always
    build:
      context: ./microservices
      dockerfile: unwrap/Dockerfile
    container_name: spruzhuk_unwrap
    restart: unless-stopped
    networks:
      - spruzhuk_net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8000/healthz >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s

  block_builder:
    image: ghcr.io/admst-dz/spruzhyk-block-builder:dev
    pull_policy: always
    build:
      context: ./microservices/block_builder
    container_name: spruzhuk_block_builder
    restart: unless-stopped
    networks:
      - spruzhuk_net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8000/healthz >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s

  glb_unwrapper:
    image: ghcr.io/admst-dz/spruzhyk-glb-unwrapper:dev
    pull_policy: always
    build:
      # build-контекст = корень репо, чтобы Dockerfile видел GLB-модели
      # из frontend/src/assets/ (см. Dockerfile, секция COPY).
      context: .
      dockerfile: microservices/glb-unwrapper/Dockerfile
    container_name: spruzhuk_glb_unwrapper
    restart: unless-stopped
    networks:
      - spruzhuk_net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8000/healthz >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

  watchtower:
    image: containrrr/watchtower
    container_name: spruzhuk_watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /root/.docker:/config
    environment:
      DOCKER_API_VERSION: "1.41"
      DOCKER_CONFIG: /config
      WATCHTOWER_CLEANUP: "true"
      WATCHTOWER_POLL_INTERVAL: "30"
      WATCHTOWER_INCLUDE_RESTARTING: "true"
      WATCHTOWER_ROLLING_RESTART: "true"
    command: spruzhuk_app spruzhuk_app_render spruzhuk_backend spruzhuk_renderer spruzhuk_techcard spruzhuk_unwrap spruzhuk_block_builder spruzhuk_glb_unwrapper

networks:
  spruzhuk_net:
    driver: bridge

volumes:
  postgres_data:
  minio_data:
  kafka_data:

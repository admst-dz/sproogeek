map $sent_http_content_type $expires {
    default                    off;
    text/html                  -1;
    text/css                   max;
    application/javascript     max;
    ~image/                    max;
    ~font/                     max;
    application/wasm           max;
    model/gltf-binary          max;
    application/octet-stream   max;
}

server {
    listen 80;
    server_name _;
    client_max_body_size 12m;

    root /usr/share/nginx/html;
    index index.html;


    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain text/css text/xml application/json application/javascript
        application/xml application/xml+rss text/javascript image/svg+xml
        application/wasm model/gltf+json model/gltf-binary;

    expires $expires;

    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok";
    }

    # .mjs (ES modules) должны отдаваться как JS,
    # иначе браузер отказывается импортировать pdf.js worker.
    location ~* \.mjs$ {
        default_type application/javascript;
        add_header Content-Type "application/javascript; charset=utf-8" always;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    location ~* \.(glb|gltf|wasm|woff2?|ttf|otf|eot|svg|png|jpg|jpeg|webp|avif|ico)$ {
        add_header Cache-Control "public, max-age=2592000, immutable";
        try_files $uri =404;
    }

    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    location /render/ {
        alias /usr/share/nginx/html/;
        try_files $uri $uri/ /index.html;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        resolver 127.0.0.11 valid=30s ipv6=off;
        set $backend_upstream backend;
        proxy_pass http://$backend_upstream:8000$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}
